# Codex CLI declarative user config.
# This file is the shared, committed source of truth. Per-machine values
# (trusted projects, model overrides) belong in .codex/config.local.toml,
# which is gitignored and merged on top at link time.
#
# The link step generates ~/.codex/config.toml from:
#   1. this shared file
#   2. .codex/config.local.toml overlay (if present)
#   3. preserved [projects.*] entries Codex writes during runtime
#
# Auto-managed sections that Codex regenerates on every startup are NOT
# committed here (e.g. [marketplaces.openai-bundled], openai-primary-runtime,
# marketplace last_updated / last_revision timestamps).

commit_attribution = ""
model = "gpt-5.5"
model_reasoning_effort = "high"
personality = "pragmatic"
sandbox_mode = "danger-full-access"
web_search = "live"

[agents]
max_threads = 16

[agents.architect]
config_file = "agents/architect.toml"
description = "Decompose hard problems into buildable pieces - system design, service boundaries, API contracts, and architecture decisions. Does not write code."

[agents.code-flow-analyzer]
config_file = "agents/code-flow-analyzer.toml"
description = "Analyze execution flow to identify over-engineering, unnecessary complexity, dead code, and simplification opportunities."

[agents.codebase-investigator]
config_file = "agents/codebase-investigator.toml"
description = "Locate specific code patterns, understand how features are implemented, trace data flow, or find relevant code sections."

[agents.codebase-reviewer]
config_file = "agents/codebase-reviewer.toml"
description = "Full codebase audit using multiple AI engines in parallel. Splits by module, reviews from different perspectives, deduplicates into a prioritized report."

[agents.debugger]
config_file = "agents/debugger.toml"
description = "Systematic debugging - reproduce, isolate, hypothesize, and fix bugs including runtime errors, memory issues, concurrency problems, and stack traces."

[agents.developer]
config_file = "agents/developer.toml"
description = "Medium-to-large coding tasks - implement features, fix bugs, or refactor with Test-Driven Development."

[agents.developer-lite]
config_file = "agents/developer-lite.toml"
description = "Simpler coding tasks - implement features, fix bugs, or refactor with TDD. Uses a faster, cheaper model."

[agents.explore]
config_file = "agents/explore.toml"
description = "Navigate and explore codebases - find files, search content, and analyze code structure. Read-only."

[agents.performance-engineer]
config_file = "agents/performance-engineer.toml"
description = "Performance analysis - profile interpretation, bottleneck identification, and optimization recommendations for CPU, memory, I/O, and database queries. Read-only."

[agents.planner]
config_file = "agents/planner.toml"
description = "Break down complex tasks into structured implementation plans with clear steps and dependencies."

[agents.researcher]
config_file = "agents/researcher.toml"
description = "Online research - gathering up-to-date information, evaluating libraries/tools, synthesizing findings, and providing actionable recommendations."

[agents.reviewer]
config_file = "agents/reviewer.toml"
description = "Review code changes for bugs, quality issues, and compliance with project conventions. Works on git diffs — does not modify code."

[agents.security-auditor]
config_file = "agents/security-auditor.toml"
description = "Code-level security review - OWASP top 10, dependency vulnerabilities, secrets in code, auth/authz patterns, and input validation. Read-only."

[agents.technical-writer]
config_file = "agents/technical-writer.toml"
description = "Generate or update documentation - READMEs, API docs, changelogs, ADRs, and architecture docs from code."

[agents.ui-polisher]
config_file = "agents/ui-polisher.toml"
description = "Captures screenshots of running apps, identifies visual issues, applies fixes, and re-verifies. Works across web, Windows, macOS, and iOS/watchOS Simulator."

[agents.ux-designer]
config_file = "agents/ux-designer.toml"
description = "Produce implementation-ready UX design documentation with layout, components, interactions, and accessibility guidance. Does not write code."

[features]
multi_agent = true
prevent_idle_sleep = true

# Only Codex marketplace sources are committed here by default.
# Codex auto-writes last_updated / last_revision into ~/.codex/config.toml
# at runtime; app-managed openai-bundled and openai-primary-runtime marketplace
# entries with absolute paths are inferred by the bootstrap command when needed.
# Third-party marketplace overlap, including Claude plugin marketplaces, must be
# declared intentionally in this file or in .codex/config.local.toml.
#
# Declarative plugin enable/disable. Run setup bootstrap-codex after link/install
# to register Codex marketplaces and install missing plugin bundles.
[plugins."build-ios-apps@openai-curated"]
enabled = true

[plugins."build-macos-apps@openai-curated"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."codex-security@openai-curated"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."figma@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

[plugins."superpowers@openai-curated"]
enabled = true

[shell_environment_policy]
inherit = "core"

[shell_environment_policy.set]
CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS = "1"
ENABLE_LSP_TOOL = "1"

[tui]
status_line = ["model-with-reasoning", "context-remaining", "current-dir", "git-branch", "five-hour-limit"]

[windows]
sandbox = "elevated"

[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp"
